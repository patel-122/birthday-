/* ===================================
✨ ADVANCED HOVER ANIMATIONS
=================================== */

/* Title Glow Hover */

.title{
  transition:0.5s;
}

.title:hover{
  transform:scale(1.05);
  text-shadow:
    0 0 10px #fff,
    0 0 20px #ff4da6,
    0 0 40px #ff4da6;
}

/* Message Card Hover */

.message{
  transition:0.5s;
}

.message:hover{
  transform:translateY(-10px) scale(1.02);
  box-shadow:
    0 15px 40px rgba(255,105,180,0.4);
}

/* Button Hover Animation */

.btn{
  position:relative;
  overflow:hidden;
}

.btn::before{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background:rgba(255,255,255,0.3);
  transition:0.5s;
}

.btn:hover::before{
  left:100%;
}

.btn:hover{
  transform:translateY(-5px) scale(1.08);
  box-shadow:
    0 10px 30px rgba(255,20,147,0.5);
}

/* Cake Hover */

.cake{
  transition:0.5s;
}

.cake:hover{
  transform:scale(1.08) rotate(2deg);
}

/* Candle Glow */

.flame{
  transition:0.3s;
}

.cake:hover .flame{
  box-shadow:
    0 0 20px orange,
    0 0 40px gold,
    0 0 60px yellow;
}

/* Gallery Images */

.photos img{
  position:relative;
  overflow:hidden;
}

.photos img:hover{
  transform:
    translateY(-12px)
    scale(1.05)
    rotate(1deg);

  box-shadow:
    0 15px 40px rgba(255,20,147,0.4);
}

/* Popup Hover */

.popup-box{
  transition:0.5s;
}

.popup-box:hover{
  transform:scale(1.03);
  box-shadow:
    0 15px 50px rgba(255,20,147,0.4);
}

/* Footer Hover */

footer{
  transition:0.5s;
}

footer:hover{
  background:rgba(255,255,255,0.35);
  letter-spacing:1px;
}

/* Floating Hearts Hover */

.heart{
  transition:0.5s;
}

.heart:hover{
  transform:scale(2);
  opacity:1;
}

/* Bubble Hover */

.bubble{
  transition:0.5s;
}

.bubble:hover{
  background:rgba(255,255,255,0.6);
  transform:scale(1.2);
}

    *{

    }

    body{

      color:white;
      text-decoration:none;
      border-radius:50px;
      transition:0.4s;
    }

    .btn:hover{
      transform:scale(1.1);
    }

    @media(max-width:768px){

      h1{
        font-size:2.8rem;
      }

      .gallery img{
        height:280px;
      }

    }
